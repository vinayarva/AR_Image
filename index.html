<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.4/dist/mindar-image-aframe.prod.js"></script>

<style>

html,body{
margin:0;
padding:0;
width:100%;
height:100%;
overflow:hidden;
}

/* loading screen */

#loadingScreen{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:black;
color:white;
display:flex;
align-items:center;
justify-content:center;
font-size:20px;
z-index:5;
}

/* scan guide */

#scanGuide{
position:absolute;
top:20px;
width:100%;
text-align:center;
color:white;
font-size:18px;
z-index:4;
}

/* sound button */

#soundBtn{
position:absolute;
bottom:40px;
right:20px;
background:black;
color:white;
padding:12px;
border-radius:50%;
font-size:20px;
cursor:pointer;
opacity:0.85;
z-index:4;
}

</style>

</head>

<body>

<div id="loadingScreen">
Loading AR Experience...
</div>

<div id="scanGuide">
Point your camera at the card
</div>

<div id="soundBtn">🔇</div>

<a-scene
mindar-image="imageTargetSrc: targets.mind; maxTrack:1; filterMinCF:0.001; filterBeta:0.01;"
embedded
vr-mode-ui="enabled:false"
device-orientation-permission-ui="enabled:false"
renderer="colorManagement:true; physicallyCorrectLights:true; logarithmicDepthBuffer:true;">

<a-assets>

<video
id="vid"
src="video.mp4"
loop
muted
playsinline
webkit-playsinline
crossorigin="anonymous">
</video>

</a-assets>

<a-camera position="0 0 0" look-controls="enabled:false"></a-camera>

<a-entity id="target" mindar-image-target="targetIndex:0">

<a-video
id="videoPlane"
src="#vid"
width="0.75"
height="1"
position="0 0 0.01"
opacity="0">
</a-video>

</a-entity>

</a-scene>

<script>

const video=document.getElementById("vid")
const videoPlane=document.getElementById("videoPlane")
const loading=document.getElementById("loadingScreen")

/* remove loading when scene ready */

document.querySelector("a-scene").addEventListener("loaded",()=>{
loading.style.display="none"
})

/* fade video in */

document.querySelector("a-scene").addEventListener("targetFound",()=>{

video.play()

videoPlane.setAttribute("animation",{
property:"opacity",
from:0,
to:1,
dur:600
})

})

/* fade out */

document.querySelector("a-scene").addEventListener("targetLost",()=>{

videoPlane.setAttribute("animation",{
property:"opacity",
to:0,
dur:300
})

})

/* loop video */

video.addEventListener("ended",()=>{

video.currentTime=0
video.play()

})

/* sound toggle */

const soundBtn=document.getElementById("soundBtn")

soundBtn.addEventListener("click",()=>{

if(video.muted){

video.muted=false
soundBtn.innerHTML="🔊"

}else{

video.muted=true
soundBtn.innerHTML="🔇"

}

})

</script>

</body>
</html>
